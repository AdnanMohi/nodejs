<main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
    <div class="container mx-auto">
        <!-- Page Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Dashboard</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4">
                <div class="bg-blue-100 p-3 rounded-full">
                    <!-- Heroicon: users -->
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-500">Total Users</h3>
                    <p class="text-3xl font-bold text-gray-900 mt-1">1,250</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4">
                <div class="bg-green-100 p-3 rounded-full">
                    <!-- Heroicon: currency-dollar -->
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v.01"></path></svg>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-500">Revenue</h3>
                    <p class="text-3xl font-bold text-gray-900 mt-1">$34.5k</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4">
                <div class="bg-yellow-100 p-3 rounded-full">
                    <!-- Heroicon: document-report -->
                     <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-500">Reports</h3>
                    <p class="text-3xl font-bold text-gray-900 mt-1">128</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg flex items-center space-x-4">
                 <div class="bg-red-100 p-3 rounded-full">
                    <!-- Heroicon: shield-exclamation -->
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6.364-4.364l-1.414-1.414M21 12h-2m-1.636-6.364l-1.414 1.414M12 3v2m6.364 4.364l1.414 1.414M3 12h2m1.636 6.364l1.414-1.414M12 21v-2m-3.636-1.636l-1.414-1.414"></path></svg>
                 </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-500">Alerts</h3>
                    <p class="text-3xl font-bold text-gray-900 mt-1">3</p>
                </div>
            </div>
        </div>

        <!-- Data Table Section -->
        <div class="mt-8 bg-white p-6 rounded-xl shadow-lg">
            <h3 class="text-xl font-semibold mb-4">Recent Users</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-200 text-gray-600 uppercase text-sm">
                            <th class="py-3 px-4">Name</th>
                            <th class="py-3 px-4">Email</th>
                            <th class="py-3 px-4">Joined Date</th>
                            <th class="py-3 px-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700">
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200">John Doe</td>
                            <td class="py-3 px-4 border-b border-gray-200">john.doe@example.com</td>
                            <td class="py-3 px-4 border-b border-gray-200">2025-07-25</td>
                            <td class="py-3 px-4 border-b border-gray-200 text-center">
                                <span class="bg-green-200 text-green-800 py-1 px-3 rounded-full text-xs font-semibold">Active</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200">Jane Smith</td>
                            <td class="py-3 px-4 border-b border-gray-200">jane.smith@example.com</td>
                            <td class="py-3 px-4 border-b border-gray-200">2025-07-24</td>
                            <td class="py-3 px-4 border-b border-gray-200 text-center">
                                <span class="bg-green-200 text-green-800 py-1 px-3 rounded-full text-xs font-semibold">Active</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200">Sam Wilson</td>
                            <td class="py-3 px-4 border-b border-gray-200">sam.wilson@example.com</td>
                            <td class="py-3 px-4 border-b border-gray-200">2025-07-22</td>
                            <td class="py-3 px-4 border-b border-gray-200 text-center">
                                <span class="bg-red-200 text-red-800 py-1 px-3 rounded-full text-xs font-semibold">Banned</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
